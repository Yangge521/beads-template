    <meta property="og:type" content="website" />
    <title>拼豆收集 - Perler Bead Templates</title>
    <script>
      // GitHub Pages SPA fallback：404 时将无 hash 路径转为 hash 路由
      // 例如 /beads-template/template/anime-xxx -> /beads-template/#/template/anime-xxx
      (function () {
        var path = window.location.pathname.replace(/\/+$/, '');
        var base = '/beads-template';
        if (path.length > base.length) {
          var rest = path.slice(base.length);
          window.location.replace(base + '/#' + rest + window.location.search);
          return;
        }
        // 兜底：回到首页
        window.location.replace(base + '/');
      })();
    </script>
  </head>
  <body>

    <p style="text-align:center;padding:2rem;font-family:sans-serif">正在跳转…</p>
